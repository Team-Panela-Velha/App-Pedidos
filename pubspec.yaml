name: app_pedidos
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  flutter_staggered_grid_view: ^0.7.0

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_svg: ^2.2.4
  provider: ^6.1.5+1
  event_bus: ^2.0.1
  get_it: ^9.2.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - images/sushi.jpg
    - images/logo.jpg
    - images/logo.svg
    - images/logo2.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: LeagueSpartan
      fonts:
        - asset: assets/fonts/LeagueSpartan-Regular.ttf
        - asset: assets/fonts/LeagueSpartan-Bold.ttf
          weight: 700